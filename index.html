<style>
:root{
  /* Atletika hlavou purple palette — dark mode */
  --purple-raw:139,15,196;       /* #8B0FC4 — exact logo purple */
  --bg:#100b14;                  /* near-black with purple tint */
  --bg2:#16101c;                 /* card surface */
  --bg3:#1f1728;                 /* elevated surface */
  --bg4:#2b2036;                 /* hover/active */
  --border:#2e2040;              /* subtle border */
  --border2:#3d2d54;             /* stronger border */
  --accent:#a020d0;              /* primary purple */
  --accent2:#8B0FC4;             /* deeper purple (logo) */
  --accent-light:#c44af0;        /* bright purple for text */
  --accent-glow:rgba(160,32,208,0.18);
  --accent-glow2:rgba(160,32,208,0.07);
  --text:#f0eaf6;
  --text2:#b8a8cc;
  --text3:#7a6891;
  /* semantic colors */
  --green:#4ade80;
  --green-bg:rgba(74,222,128,0.09);
  --green-border:rgba(74,222,128,0.22);
  --red:#f87171;
  --red-bg:rgba(248,113,113,0.09);
  --red-border:rgba(248,113,113,0.22);
  --amber:#fbbf24;
  --amber-bg:rgba(251,191,36,0.1);
  --amber-border:rgba(251,191,36,0.28);
  --teal:#34d4c8;
  --teal-bg:rgba(52,212,200,0.09);
  --teal-border:rgba(52,212,200,0.22);
  --radius:11px;
  --radius-sm:8px;
  --font-sans:'Urbanist',sans-serif;
  --font-display:'Urbanist',sans-serif;
  --font-mono:'DM Mono',monospace;
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--text);background:var(--bg);min-height:100vh}
.hidden{display:none!important}
.app{padding:1rem;max-width:1100px;margin:0 auto}

/* CARDS */
.card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:1.25rem;
  margin-bottom:1rem;
  box-shadow:0 2px 16px rgba(0,0,0,0.35);
}

/* BUTTONS */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 15px;
  border:1px solid var(--border2);
  border-radius:var(--radius-sm);
  background:var(--bg3);
  color:var(--text2);
  font-size:13px;cursor:pointer;
  font-family:var(--font-sans);font-weight:600;
  transition:all .15s;white-space:nowrap;
}
.btn:hover{background:var(--bg4);border-color:var(--accent);color:var(--accent-light)}
.btn-primary{
  background:var(--accent2);color:#fff;border-color:var(--accent2);font-weight:700;
  box-shadow:0 0 20px rgba(139,15,196,0.35);
}
.btn-primary:hover{background:var(--accent);border-color:var(--accent);box-shadow:0 0 28px rgba(160,32,208,0.45)}
.btn-danger{color:var(--red);border-color:var(--red-border);background:var(--red-bg)}
.btn-danger:hover{background:rgba(248,113,113,0.16);border-color:var(--red)}
.btn-sm{padding:5px 10px;font-size:12px;border-radius:6px}

/* FORM ELEMENTS */
label{
  display:block;font-size:11px;color:var(--text3);
  margin-bottom:5px;margin-top:13px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.07em;
}
label:first-child{margin-top:0}
input,select,textarea{
  width:100%;padding:9px 12px;
  border:1px solid var(--border2);
  border-radius:var(--radius-sm);
  background:var(--bg3);
  color:var(--text);
  font-size:13px;font-family:var(--font-sans);
  transition:border-color .15s,box-shadow .15s;
  -webkit-appearance:none;
}
input::placeholder,textarea::placeholder{color:var(--text3)}
input:focus,select:focus,textarea:focus{
  outline:none;
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-glow);
}
select option{background:var(--bg3);color:var(--text)}
.form2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* TABS */
.tab-bar{
  display:flex;gap:0;margin-bottom:1.25rem;
  border-bottom:1px solid #2e2040;
}
.tab{
  padding:10px 17px;font-size:13px;cursor:pointer;
  border:none;border-bottom:2px solid transparent;
  color:var(--text3);background:none;
  font-family:var(--font-sans);margin-bottom:-1px;font-weight:600;
  transition:color .15s,border-color .15s;
}
.tab.active{color:var(--accent-light);border-bottom-color:var(--accent);font-weight:700}
.tab:hover:not(.active){color:var(--text2)}

/* TABLE */
table{width:100%;border-collapse:collapse;font-size:13px}
th{
  text-align:left;padding:9px 12px;
  color:var(--text3);font-weight:700;
  border-bottom:1px solid #2e2040;
  background:rgba(139,15,196,0.06);
  font-size:10.5px;text-transform:uppercase;letter-spacing:0.08em;
}
td{padding:10px 12px;border-bottom:1px solid #2e2040;color:var(--text)}
tbody tr:nth-child(even) td{background:rgba(255,255,255,0.015)}
tbody tr:hover td{background:var(--accent-glow2)}
tr:last-child td{border-bottom:none}

/* BADGES */
.badge{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;font-weight:700}
.b-blue{background:rgba(160,32,208,0.15);color:var(--accent-light);border:1px solid rgba(160,32,208,0.35)}
.b-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.b-amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.b-gray{background:var(--bg4);color:var(--text2);border:1px solid var(--border2)}
.b-teal{background:var(--teal-bg);color:var(--teal);border:1px solid var(--teal-border)}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:1rem}
.stat-card{
  background:var(--bg2);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:1.1rem 1rem;text-align:center;
  position:relative;overflow:hidden;
  transition:border-color .2s,transform .2s;
}
.stat-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--accent2),var(--accent-light));
  opacity:0;transition:opacity .2s;
}
.stat-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.stat-card:hover::before{opacity:1}
.stat-val{font-size:30px;font-weight:900;color:var(--accent-light);font-family:var(--font-display);position:relative;line-height:1}
.stat-lbl{font-size:11px;color:var(--text3);margin-top:5px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em}

/* ALERTS */
.alert{padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:12px;font-weight:500}
.alert-r{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.alert-g{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}

/* AVATAR */
.avatar{
  width:34px;height:34px;border-radius:50%;
  background:rgba(139,15,196,0.18);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:var(--accent-light);
  flex-shrink:0;border:1px solid rgba(160,32,208,0.4);
  font-family:var(--font-display);
}

/* SECTION HEADER */
.section-hd{font-size:15px;font-weight:800;margin-bottom:12px;color:var(--text);font-family:var(--font-display);letter-spacing:-0.01em}
.empty{text-align:center;padding:2.5rem;color:var(--text3);font-size:13px}

/* CHART */
.chart-wrap{position:relative;height:260px;margin-top:1rem}

/* HEADER */
.hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 0 1.25rem;
  border-bottom:1px solid #2e2040;
  margin-bottom:1rem;
}

/* LOGIN */
.login-wrap{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:1.5rem 1rem;
  background:var(--bg);
  position:relative;overflow:hidden;
}
.login-wrap::before{
  content:'';position:absolute;
  width:700px;height:700px;
  background:radial-gradient(circle,rgba(139,15,196,0.12) 0%,transparent 65%);
  top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:none;
}
.login-card{
  background:var(--bg2);
  border:1px solid var(--border2);
  border-radius:16px;
  padding:2.5rem 2rem;
  width:100%;max-width:380px;
  box-shadow:0 8px 40px rgba(0,0,0,0.5),0 0 0 1px rgba(160,32,208,0.08);
  position:relative;z-index:1;
}
.role-tabs{display:flex;gap:8px;margin-bottom:1.25rem}
.role-tab{
  flex:1;padding:9px;border:1px solid var(--border2);
  border-radius:var(--radius-sm);background:transparent;
  cursor:pointer;font-size:13px;font-family:var(--font-sans);
  color:var(--text3);text-align:center;transition:all .15s;font-weight:600;
}
.role-tab.active{border-color:var(--accent);background:var(--accent-glow);color:var(--accent-light);font-weight:700}
.demo-box{margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);font-size:12px;color:var(--text3)}

/* FILTERS */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:1rem}
.filter-row select,.filter-row input{width:auto;min-width:130px}

/* PR BADGE */
.pr-badge{
  background:linear-gradient(135deg,var(--accent2),var(--accent));
  color:#fff;font-size:10px;padding:2px 7px;border-radius:20px;
  margin-left:5px;font-weight:800;letter-spacing:0.04em;
}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(8,4,12,0.8);display:flex;align-items:center;justify-content:center;padding:1.5rem 1rem;z-index:100;backdrop-filter:blur(6px)}
.modal{
  background:var(--bg2);
  border-radius:14px;
  border:1px solid var(--border2);
  box-shadow:0 20px 60px rgba(0,0,0,0.6),0 0 0 1px rgba(160,32,208,0.1);
  padding:1.75rem;width:100%;max-width:440px;
}
.modal-title{font-size:17px;font-weight:800;margin-bottom:1rem;font-family:var(--font-display);color:var(--text);letter-spacing:-0.01em}
.app-shell{position:relative}

/* ATTEMPTS */
.attempt-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.attempt-row input{flex:1}
.attempt-num{
  font-size:12px;color:var(--text3);min-width:20px;
  text-align:right;font-weight:600;font-family:var(--font-mono);
}
.attempts-box{
  background:var(--bg);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:12px;margin-top:8px;
}

/* VIEW TOGGLE */
.view-toggle{display:flex;gap:3px}
.vt-btn{
  padding:5px 12px;font-size:12px;
  border:1px solid var(--border2);border-radius:6px;
  cursor:pointer;background:var(--bg3);
  font-family:var(--font-sans);color:var(--text3);font-weight:600;
  transition:all .12s;
}
.vt-btn.active{background:var(--accent2);color:#fff;border-color:var(--accent2)}
.vt-btn:hover:not(.active){border-color:var(--accent);color:var(--accent-light)}
.attempts-detail{font-size:12px;color:var(--text3)}

/* BRANDING */
.brand-logo{
  font-family:var(--font-display);
  font-size:20px;font-weight:900;
  color:var(--text);
  letter-spacing:-0.03em;
}
.brand-logo span{color:var(--accent-light)}
.brand-sub{font-size:12px;color:var(--text3);margin-top:2px;font-family:var(--font-mono)}

/* SERIES BOX */
[id^="coach-series-"],[id^="ath-series-"]{
  margin-bottom:10px;
  border:1px solid var(--border2);
  border-radius:var(--radius-sm);
  padding:10px;
  background:var(--bg);
}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:rgba(160,32,208,0.3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(160,32,208,0.5)}

/* CODE TAG */
code{
  font-family:var(--font-mono);
  font-size:11px;
  background:rgba(139,15,196,0.1);
  border:1px solid rgba(139,15,196,0.2);
  border-radius:4px;
  padding:1px 5px;
  color:var(--accent-light);
}
</style>

<script>
// ── Supabase konfigurace ────────────────────────────────────
const SB_URL='https://ytfdorfwmkwesjhdkfhz.supabase.co';
const SB_KEY='sb_publishable_0VC3aK8r6v6NQWU1l75otA_TYOhSgLg';

async function sbGet(table, params=''){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?${params}`,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbInsert(table, body){
  const r=await fetch(`${SB_URL}/rest/v1/${table}`,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(body)});
  if(!r.ok) throw new Error(await r.text());
}
async function sbDelete(table, match){
  const params=Object.entries(match).map(([k,v])=>`${k}=eq.${encodeURIComponent(v)}`).join('&');
  const r=await fetch(`${SB_URL}/rest/v1/${table}?${params}`,{method:'DELETE',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});

function fd(d){ if(!d)return''; const p=d.split('-'); return p[2]+'.'+p[1]+'.'+p[0]; }
function mt(id){ return D.measureTypes.find(m=>m.id===id); }
function au(id){ return D.users.find(u=>u.id===id); }
function getAllAttempts(rec){
  if(rec.series&&rec.series.length) return rec.series.flatMap(s=>s.attempts||[]);
  return rec.attempts||[];
}
function best(rec){ const m=mt(rec.type); const all=getAllAttempts(rec); return m&&m.lib ? Math.min(...all) : Math.max(...all); }
function avg(rec){
  const all=getAllAttempts(rec);
  const sum=all.reduce((a,b)=>a+b,0);
  const raw=sum/all.length;
  // round to max decimal places used in source values
  const maxDec=Math.max(...all.map(v=>{
    const s=v.toString();
    const d=s.indexOf('.');
    return d>=0?s.length-d-1:0;
  }));
  return parseFloat(raw.toFixed(maxDec));
}
function fmtVal(v,unit){ return parseFloat(v.toFixed(3))+' '+unit; }

function seriesLabel(r){
  if(r.series&&r.series.length){
    const counts=r.series.map(s=>(s.attempts||[]).length);
    const allSame=counts.every(c=>c===counts[0]);
    if(allSame) return `${r.series.length}×${counts[0]}`;
    // group consecutive equal counts: e.g. [3,3,2] -> "2×3 1×2"
    const groups=[];
    counts.forEach(c=>{
      if(groups.length&&groups[groups.length-1].c===c) groups[groups.length-1].n++;
      else groups.push({c,n:1});
    });
    return groups.map(g=>`${g.n}×${g.c}`).join(' ');
  }
  return (r.attempts||[]).length+'×';
}

function attemptsHTML(rec, mode){
  const b=best(rec), a=avg(rec);
  const hasSeries=rec.series&&rec.series.length>0;
  const allAttempts=getAllAttempts(rec);
  if(allAttempts.length===1) return `<strong>${fmtVal(allAttempts[0],rec.unit)}</strong>`;
  if(mode==='best') return `<strong>${fmtVal(b,rec.unit)}</strong> <span class="badge b-amber">nejlepší</span>`;
  if(mode==='avg') return `<strong>${fmtVal(a,rec.unit)}</strong> <span class="badge b-teal">průměr</span>`;
  // 'all' mode
  if(hasSeries){
    return rec.series.map((s,si)=>{
      const sMetrics=(s.metrics||[]);
      const perAtt={};
      sMetrics.filter(m=>m.scope==='per_attempt').forEach(m=>{ const ai=m.attempt||1; if(!perAtt[ai]) perAtt[ai]=[]; perAtt[ai].push(m); });
      const allMNames=[...new Set(sMetrics.filter(m=>m.scope==='per_attempt').map(m=>m.name))];
      const sessionMets=sMetrics.filter(m=>m.scope==='session');
      const attRows=(s.attempts||[]).map((v,i)=>{
        const ai=i+1;
        const label=`${si+1}.${ai}`;
        const metParts=allMNames.map(mn=>{
          const me=(perAtt[ai]||[]).find(m=>m.name===mn);
          return me
            ? `<span style="font-size:11px;background:rgba(160,32,208,0.12);border:1px solid rgba(160,32,208,0.3);border-radius:4px;padding:1px 6px;color:var(--accent-light);margin-left:6px"><b>${mn}:</b> ${me.value} ${me.unit}</span>`
            : `<span style="font-size:11px;color:#7a6891;margin-left:6px">${mn}: —</span>`;
        }).join('');
        const isLast=i===(s.attempts||[]).length-1&&!sessionMets.length;
        return `<div style="display:flex;align-items:center;padding:3px 0;${isLast?'':'border-bottom:1px solid #2e2040'}">
          <span style="font-size:12px;color:#7a6891;min-width:32px;font-family:var(--font-mono)">${label}</span>
          <strong style="font-size:13px;min-width:70px;color:#f0eaf6">${v} ${rec.unit}</strong>${metParts}
        </div>`;
      }).join('');
      const sessParts=sessionMets.map(me=>`<span style="font-size:11px;background:rgba(74,222,128,0.09);border:1px solid rgba(74,222,128,0.22);border-radius:4px;padding:1px 6px;color:#4ade80;margin-right:4px"><b>${me.name}:</b> ${me.value} ${me.unit}</span>`).join('');
      return `<div style="margin-bottom:4px;padding:5px 8px;background:#100b14;border:1px solid #2e2040;border-radius:6px">
        ${attRows}
        ${sessParts?`<div style="margin-top:4px">${sessParts}</div>`:''}
      </div>`;
    }).join('');
  }
  // single series - show as 1.1, 1.2...
  const perAttemptMetrics={};
  (rec.metrics||[]).filter(me=>me.scope==='per_attempt').forEach(me=>{
    const ai=(me.attempt||1);
    if(!perAttemptMetrics[ai]) perAttemptMetrics[ai]=[];
    perAttemptMetrics[ai].push(me);
  });
  const allMetricNames=[...new Set((rec.metrics||[]).filter(me=>me.scope==='per_attempt').map(me=>me.name))];
  const dataRows=allAttempts.map((v,i)=>{
    const ai=i+1;
    const mets=perAttemptMetrics[ai]||[];
    const metricsByName={};
    mets.forEach(me=>{ metricsByName[me.name]=me; });
    const metParts=allMetricNames.map(mn=>{
      const me=metricsByName[mn];
      return me
        ? `<span style="font-size:11px;background:rgba(160,32,208,0.12);border:1px solid rgba(160,32,208,0.3);border-radius:4px;padding:1px 6px;color:var(--accent-light);margin-left:6px"><b>${mn}:</b> ${me.value} ${me.unit}</span>`
        : `<span style="font-size:11px;color:#7a6891;margin-left:6px">${mn}: —</span>`;
    }).join('');
    const isLast=i===allAttempts.length-1;
    return `<div style="display:flex;align-items:center;padding:4px 0;${isLast?'':'border-bottom:1px solid #2e2040'}">
      <span style="font-size:12px;color:#7a6891;min-width:32px;font-family:var(--font-mono)">1.${ai}</span>
      <strong style="font-size:13px;min-width:70px;color:#f0eaf6">${v} ${rec.unit}</strong>
      ${metParts}
    </div>`;
  }).join('');
  return `<div>${dataRows}</div>`;
}

async function saveEditRec(id){
  const r=D.records.find(x=>x.id===id);
  if(!r) return;
  const date=document.getElementById('edit-date').value;
  const unit=document.getElementById('edit-unit').value.trim();
  const note=document.getElementById('edit-note').value.trim();
  const attempts=[];
  document.querySelectorAll('.edit-att-val').forEach(inp=>{ const v=parseFloat(inp.value); if(!isNaN(v)) attempts.push(v); });
  const ma=document.getElementById('m-alert');
  if(!date||!unit||!attempts.length){ ma.innerHTML='<div class="alert alert-r">Vyplňte vše</div>'; return; }
  // collect edited session metrics
  const metNames=[...document.querySelectorAll('.edit-met-name')].map(e=>e.value.trim());
  const metVals=[...document.querySelectorAll('.edit-met-val')].map(e=>parseFloat(e.value));
  const metUnits=[...document.querySelectorAll('.edit-met-unit')].map(e=>e.value);
  const metIds=[...document.querySelectorAll('.edit-met-id')].map(e=>e.value);
  const metrics=(r.metrics||[]).filter(m=>m.scope==='per_attempt');
  metNames.forEach((name,i)=>{ if(name&&!isNaN(metVals[i])) metrics.push({id:metIds[i],name,unit:metUnits[i],value:metVals[i],scope:'session'}); });
  ma.innerHTML='<div class="alert" style="background:rgba(160,32,208,0.12);color:var(--accent-light)">Ukládám…</div>';
  try{
    const patch={date,unit,note,attempts,metrics,series:r.series||null};
    const res=await fetch(`${SB_URL}/rest/v1/records?id=eq.${encodeURIComponent(id)}`,{
      method:'PATCH',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify(patch)
    });
    if(!res.ok) throw new Error(await res.text());
    Object.assign(r,patch);
    closeModal(); renderDashboard();
  }catch(e){ ma.innerHTML='<div class="alert alert-r">Chyba: '+e.message+'</div>'; }
}

}

let seriesCount={coach:0, ath:0};

function addSeries(prefix){
  seriesCount[prefix]=(seriesCount[prefix]||0)+1;
  const sn=seriesCount[prefix];
  const container=document.getElementById(`series-container-${prefix}`);
  const div=document.createElement('div');
  div.id=`${prefix}-series-${sn}`;
  div.style.cssText='margin-bottom:10px;border:1px solid #3d2d54;border-radius:8px;padding:10px;background:#100b14';
  div.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div style="font-size:13px;font-weight:700;color:#f0eaf6">Série ${sn}</div>
      <button class="btn btn-sm btn-danger" onclick="removeSeries('${prefix}',${sn})">× Odebrat sérii</button>
    </div>
    <div id="${prefix}-series-attempts-${sn}">
      ${attemptRowHTML(1,`${prefix}-s${sn}`)}
    </div>
    <div style="display:flex;gap:8px;margin-top:6px">
      <button class="btn btn-sm" onclick="addSeriesAttempt('${prefix}',${sn})">+ Pokus</button>
      <button class="btn btn-sm btn-danger" id="${prefix}-s${sn}-rem-btn" style="display:none" onclick="removeSeriesAttempt('${prefix}',${sn})">- Odebrat</button>
    </div>
    <div style="margin-top:8px;border-top:1px solid #e8eaed;padding-top:8px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:12px;color:#7a6891;font-weight:600">Metriky série</span>
        <button class="btn btn-sm" onclick="addSessionMetric('${prefix}-s${sn}')">+ metrika</button>
      </div>
      <div id="session-metrics-${prefix}-s${sn}"></div>
    </div>`;
  container.appendChild(div);
  // init attempt count for this series
  if(!window._sCounts) window._sCounts={};
  window._sCounts[`${prefix}-s${sn}`]=1;
}

function removeSeries(prefix, sn){
  const el=document.getElementById(`${prefix}-series-${sn}`);
  if(el) el.remove();
}

function addSeriesAttempt(prefix, sn){
  const sp=`${prefix}-s${sn}`;
  if(!window._sCounts) window._sCounts={};
  window._sCounts[sp]=(window._sCounts[sp]||1)+1;
  const n=window._sCounts[sp];
  const box=document.getElementById(`${prefix}-series-attempts-${sn}`);
  const div=document.createElement('div');
  div.innerHTML=attemptRowHTML(n,sp);
  box.appendChild(div.firstElementChild);
  const remBtn=document.getElementById(`${sp}-rem-btn`);
  if(remBtn) remBtn.style.display=n>1?'':'none';
}

function removeSeriesAttempt(prefix, sn){
  const sp=`${prefix}-s${sn}`;
  if(!window._sCounts||window._sCounts[sp]<=1) return;
  const box=document.getElementById(`${prefix}-series-attempts-${sn}`);
  box.removeChild(box.lastChild);
  window._sCounts[sp]--;
  const remBtn=document.getElementById(`${sp}-rem-btn`);
  if(remBtn) remBtn.style.display=window._sCounts[sp]>1?'':'none';
}

function collectSeries(prefix){
  const container=document.getElementById(`series-container-${prefix}`);
  if(!container) return null;
  const seriesDivs=container.querySelectorAll(`[id^="${prefix}-series-"]`);
  if(!seriesDivs.length) return null;
  const series=[];
  seriesDivs.forEach(div=>{
    const sn=div.id.replace(`${prefix}-series-`,'');
    const sp=`${prefix}-s${sn}`;
    const attempts=[];
    // only select attempt inputs directly belonging to this series' attempts container
    const attBox=document.getElementById(`${prefix}-series-attempts-${sn}`);
    if(attBox){
      attBox.querySelectorAll('.attempt-val').forEach(inp=>{ const v=parseFloat(inp.value); if(!isNaN(v)) attempts.push(v); });
    }
    const metrics=[];
    div.querySelectorAll('.am-val').forEach(inp=>{
      const v=parseFloat(inp.value); if(isNaN(v)) return;
      const sel=inp.closest('div[id]')?.querySelector('select'); if(!sel?.dataset.metricId) return;
      metrics.push({id:sel.dataset.metricId,name:sel.dataset.metricName,unit:sel.dataset.metricUnit,value:v,scope:'per_attempt',attempt:parseInt(inp.dataset.attempt)||1});
    });
    div.querySelectorAll('.sm-val').forEach(inp=>{
      const v=parseFloat(inp.value); if(isNaN(v)) return;
      const sel=inp.closest('div[id]')?.querySelector('select'); if(!sel?.dataset.metricId) return;
      metrics.push({id:sel.dataset.metricId,name:sel.dataset.metricName,unit:sel.dataset.metricUnit,value:v,scope:'session'});
    });
    if(attempts.length) series.push({attempts,metrics});
  });
  return series.length?series:null;
}

function attemptRowHTML(num, prefix){
  return `<div class="attempt-row" id="${prefix}-attempt-row-${num}" style="flex-wrap:wrap;align-items:flex-start;padding:6px 0;border-bottom:1px solid #2e2040">
    <span class="attempt-num" style="margin-top:8px">${num}.</span>
    <input type="number" step="0.01" class="attempt-val" placeholder="0.00" style="width:120px;flex-shrink:0">
    <button class="btn btn-sm" style="font-size:11px;padding:4px 10px;margin-top:2px;flex-shrink:0" onclick="addAttemptMetric('${prefix}',${num})">+ metrika</button>
    <div id="${prefix}-attempt-metrics-${num}" style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;width:100%;padding-left:28px"></div>
  </div>`;
}

function addAttemptMetric(prefix, num){
  const container=document.getElementById(`${prefix}-attempt-metrics-${num}`);
  const mid='am-'+Date.now();
  const metricOpts=D.metricTypes&&D.metricTypes.length
    ? `<option value="">— vyber —</option>${D.metricTypes.map(m=>`<option value="${m.id}" data-name="${m.name}" data-unit="${m.unit}">${m.name} (${m.unit})</option>`).join('')}<option value="__new__">+ Nová…</option>`
    : `<option value="__new__">+ Nová metrika…</option>`;
  const div=document.createElement('div');
  div.style.cssText='display:inline-flex;gap:4px;align-items:center;margin-top:4px;background:rgba(160,32,208,0.1);border:1px solid rgba(160,32,208,0.25);border-radius:6px;padding:4px 6px';

    <select style="width:auto;min-width:130px;font-size:12px;padding:4px 6px;border:1px solid #3d2d54;border-radius:6px;background:#1f1728;color:#f0eaf6" onchange="onAttemptMetricSelect(this,'${mid}')">

function onAttemptMetricSelect(sel, mid){
  const div=document.getElementById(mid);
  if(sel.value==='__new__'){
    const name=prompt('Název metriky (např. Laktát):');
    if(!name){sel.value='';return;}
    const unit=prompt('Jednotka (např. mmol):');
    if(!unit){sel.value='';return;}
    const id='mt-'+name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'')+'-'+Date.now();
    if(!D.metricTypes) D.metricTypes=[];
    D.metricTypes.push({id,name,unit});
    // save to supabase async
    sbInsert('metric_types',{id,name,unit}).catch(e=>console.warn('metric save:',e));
    // add option to all selects
    document.querySelectorAll('select[onchange^="onAttemptMetricSelect"], select[onchange^="onSessionMetricSelect"]').forEach(s=>{
      const newOpt=new Option(`${name} (${unit})`,id);
      newOpt.dataset.name=name; newOpt.dataset.unit=unit;
      s.insertBefore(newOpt, s.querySelector('option[value="__new__"]'));
      if(s===sel) s.value=id;
    });
    div.querySelector('.am-unit').textContent=unit;
    div.querySelector('select').dataset.metricId=id;
    div.querySelector('select').dataset.metricName=name;
    div.querySelector('select').dataset.metricUnit=unit;
  } else if(sel.value){
    const opt=sel.options[sel.selectedIndex];
    div.querySelector('.am-unit').textContent=opt.dataset.unit||'';
    sel.dataset.metricId=sel.value;
    sel.dataset.metricName=opt.dataset.name||opt.text;
    sel.dataset.metricUnit=opt.dataset.unit||'';
  }
}

function fillUnit(){

async function saveRec(){
  const ath=document.getElementById('f-ath').value;
  const date=document.getElementById('f-date').value;
  const type=document.getElementById('f-type').value;
  const unit=document.getElementById('f-unit').value.trim();
  const note=document.getElementById('f-note').value.trim();
  const seriesData=collectSeries('coach');
  let attempts=[], metrics=[];
  if(seriesData){
    attempts=seriesData.flatMap(s=>s.attempts);
    metrics=seriesData.flatMap(s=>s.metrics);
  } else {
    document.querySelectorAll('#cv-add .attempt-val').forEach(inp=>{ const v=parseFloat(inp.value); if(!isNaN(v)) attempts.push(v); });
  }
  const aa=document.getElementById('add-alert');
  if(!ath||!date||!type||!unit||attempts.length===0){
    aa.innerHTML='<div class="alert alert-r">Vyplňte všechna povinná pole a alespoň jeden pokus</div>'; return;
  }
  aa.innerHTML='<div class="alert" style="background:rgba(160,32,208,0.12);color:var(--accent-light);border:1px solid rgba(160,32,208,0.3)">Ukládám…</div>';
  const rec={id:'r'+Date.now(),ath,type,attempts,unit,date,note,metrics,series:seriesData};
  try{
    await sbInsert('records',{...rec,series:rec.series?JSON.stringify(rec.series):null});
    D.records.push(rec);
    aa.innerHTML=`<div class="alert alert-g">Výkon uložen! ${attempts.length} pokus${attempts.length>1?'ů':''}</div>`;
    setTimeout(()=>{ renderAddForm(); },1500);
  }catch(e){ aa.innerHTML='<div class="alert alert-r">Chyba uložení: '+e.message+'</div>'; }
}

async function saveProfile(uid){
  const name=document.getElementById('p-name').value.trim();
  const pass=document.getElementById('p-pass').value;
  const ma=document.getElementById('m-alert');
  if(!name||!pass){ ma.innerHTML='<div class="alert alert-r">Vyplňte jméno a heslo</div>'; return; }
  ma.innerHTML='<div class="alert" style="background:rgba(160,32,208,0.12);color:var(--accent-light);border:1px solid rgba(160,32,208,0.3)">Ukládám…</div>';
  try{
    // Supabase UPDATE
    const r=await fetch(`${SB_URL}/rest/v1/users?id=eq.${encodeURIComponent(uid)}`,{
      method:'PATCH',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({name,pass})
    });
    if(!r.ok) throw new Error(await r.text());
    const u=D.users.find(x=>x.id===uid);
    if(u){ u.name=name; u.pass=pass; }
    closeModal();
    // re-render whichever tab is active
    renderAthletes(); renderCoaches();
  }catch(e){ ma.innerHTML='<div class="alert alert-r">Chyba: '+e.message+'</div>'; }
}

function setVM(m){
  viewMode=m;

  filterResults();
}

function filterResults(){
  const tf=document.getElementById('flt-type').value;
  const ff=document.getElementById('flt-from').value;
  const ft=document.getElementById('flt-to').value;
  let recs=D.records.filter(r=>r.ath===CU.id);
  if(tf) recs=recs.filter(r=>r.type===tf);
  if(ff) recs=recs.filter(r=>r.date>=ff);
  if(ft) recs=recs.filter(r=>r.date<=ft);
  recs=recs.sort((a,b)=>b.date.localeCompare(a.date));

  const allRecs=D.records.filter(r=>r.ath===CU.id);
  const prMap={};
  [...new Set(allRecs.map(r=>r.type))].forEach(tid=>{
    const m=mt(tid);
    const tr=allRecs.filter(r=>r.type===tid);
    if(!tr.length) return;
    const bests=tr.map(r=>best(r));
    prMap[tid]=m&&m.lib ? Math.min(...bests) : Math.max(...bests);
  });

  const el=document.getElementById('res-table');
  if(!recs.length){ el.innerHTML='<div class="empty">Žádné záznamy</div>'; return; }
  el.innerHTML=`<div style="overflow-x:auto"><table>
    <thead><tr><th>Datum</th><th>Disciplína</th><th>Opak.</th><th>Výkon</th><th>Poznámka</th></tr></thead>
    <tbody>${recs.map(r=>{
      const m=mt(r.type);
      const b=best(r);
      const isPR=prMap[r.type]===b;
      const sessionMets=(r.metrics||[]).filter(me=>me.scope==='session');
      const sessionHTML=sessionMets.length?sessionMets.map(me=>`<span style="display:inline-block;margin-right:4px;font-size:11px;background:rgba(74,222,128,0.09);border:1px solid rgba(74,222,128,0.22);border-radius:4px;padding:2px 6px;color:#4ade80"><b>${me.name}:</b> ${me.value} ${me.unit}</span>`).join(''):'';
      return `<tr>
        <td>${fd(r.date)}</td>
        <td><span class="badge b-blue">${m?m.name:r.type}</span></td>
        <td style="color:#7a6891;font-size:12px">${seriesLabel(r)}</td>
        <td>${attemptsHTML(r,viewMode)}${isPR&&viewMode!=='all'?'<span class="pr-badge">PR</span>':''}</td>
        <td style="color:#7a6891;font-size:12px">
          ${sessionHTML?`<div style="margin-bottom:4px">${sessionHTML}</div>`:''}
          ${r.note||''}
        </td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

function fmtDate(ts){ const d=new Date(ts); return `${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')}.${d.getFullYear()}`; }

function buildChartConfig(groupedRecs, vals, mode, unit){
  const minY=Math.min(...vals);
  const maxY=Math.max(...vals);
  const pad=(maxY-minY)*0.2||0.1;
  const labels=groupedRecs.map(r=>fd(r.date));
  return {
    labels,
    lineData: vals.map((y,i)=>({y, gi:i})),
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        datalabels:{
          align:'top', anchor:'top',
          font:{size:11, weight:'600'},
          color:'#c44af0',
          formatter:(v,ctx)=>parseFloat(vals[ctx.dataIndex].toFixed(4))+' '+(unit||'')
        },
        tooltip:{
          callbacks:{
            title:(items)=>fd(groupedRecs[items[0].dataIndex].date),
            label:(c)=>{
              const r=groupedRecs[c.dataIndex];
              const lines=[];
              const allAtts=getAllAttempts(r);
              allAtts.forEach((v,i)=>{
                const isBest=mode==='best'&&v===best(r);
                lines.push(`${isBest?'▶':'  '} Pokus ${i+1}: ${v} ${r.unit}`);
              });
              if(mode==='avg') lines.push(`─── Průměr: ${avg(r)} ${r.unit}`);
              const sm=(r.metrics||[]).filter(me=>me.scope==='session');
              if(sm.length){ lines.push(''); sm.forEach(me=>lines.push(`${me.name}: ${me.value} ${me.unit}`)); }
              if(r.series&&r.series.length){
                r.series.forEach((s,si)=>{
                  const ssm=(s.metrics||[]).filter(m=>m.scope==='session');
                  if(ssm.length){ lines.push(`Série ${si+1}:`); ssm.forEach(m=>lines.push(`  ${m.name}: ${m.value} ${m.unit}`)); }
                });
              }
              return lines;
            }
          }
        }
      },
      scales:{
        y:{
          min: minY-pad,
          max: maxY+pad,
          grid:{color:'rgba(160,32,208,0.08)'},
          ticks:{font:{size:11,family:"'DM Mono',monospace"},color:'#7a6891', callback:(v)=>parseFloat(v.toFixed(3))}
        },
        x:{
          grid:{display:false,color:'rgba(160,32,208,0.05)'},
          ticks:{font:{size:11,family:"'DM Mono',monospace"},color:'#7a6891'}
        }
      }
    }
  };
}

function groupByDate(recs, mode){
  const mtype=mt(recs[0]?.type);
  const lowerBetter=mtype&&mtype.lib;
  const byDate={};
  recs.forEach(r=>{
    const v=mode==='avg'?avg(r):best(r);
    if(!byDate[r.date]||(lowerBetter?v<byDate[r.date].val:v>byDate[r.date].val)){
      byDate[r.date]={val:v,r};
    }
  });
  return Object.values(byDate).sort((a,b)=>a.r.date.localeCompare(b.r.date));
}

function drawChart(){
  const typeId=document.getElementById('chart-sel').value;
  const mode=document.getElementById('chart-mode').value;
  if(!typeId) return;
  const recs=D.records.filter(r=>r.ath===CU.id&&r.type===typeId).sort((a,b)=>a.date.localeCompare(b.date));
  const m=mt(typeId);
  const grouped=groupByDate(recs,mode);
  const groupedRecs=grouped.map(g=>g.r);
  const vals=grouped.map(g=>g.val);
  if(perfChart){perfChart.destroy();perfChart=null;}
  const ctx=document.getElementById('perf-chart').getContext('2d');
  const {labels,lineData,options}=buildChartConfig(groupedRecs,vals,mode,recs[0]?.unit||'');
  perfChart=new Chart(ctx,{
    type:'line',
    data:{labels,datasets:[{data:lineData.map(d=>d.y),borderColor:'#a020d0',backgroundColor:'rgba(160,32,208,0.18)',
      pointBackgroundColor:'#c44af0',pointRadius:7,pointHoverRadius:10,tension:0,fill:true,borderWidth:2}]},
    options
  });
  document.getElementById('chart-note').innerHTML='';
}

function drawCoachChart(){
  const athId=document.getElementById('cc-ath').value;
  const typeId=document.getElementById('cc-type').value;
  const mode=document.getElementById('cc-mode').value;
  if(!athId||!typeId){ if(coachPerfChart){coachPerfChart.destroy();coachPerfChart=null;} return; }
  const recs=D.records.filter(r=>r.ath===athId&&r.type===typeId).sort((a,b)=>a.date.localeCompare(b.date));
  if(!recs.length){ if(coachPerfChart){coachPerfChart.destroy();coachPerfChart=null;} return; }
  const grouped=groupByDate(recs,mode);

  const canvas=document.getElementById('coach-perf-chart');

  const {labels,lineData,options}=buildChartConfig(groupedRecs,vals,mode,recs[0]?.unit||'');

    type:'line',
    data:{labels,datasets:[{data:lineData.map(d=>d.y),borderColor:'#a020d0',backgroundColor:'rgba(160,32,208,0.18)',
