
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text-primary);background:var(--color-background-tertiary)}
.hidden{display:none!important}
.app{padding:1rem}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1rem}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-primary);font-size:14px;cursor:pointer;font-family:var(--font-sans)}
.btn:hover{background:var(--color-background-secondary)}
.btn-primary{background:#185FA5;color:#fff;border-color:#185FA5}
.btn-primary:hover{background:#0C447C;border-color:#0C447C}
.btn-danger{color:#A32D2D;border-color:#F09595}
.btn-danger:hover{background:#FCEBEB}
.btn-sm{padding:5px 10px;font-size:13px}
label{display:block;font-size:13px;color:var(--color-text-secondary);margin-bottom:4px;margin-top:12px}
label:first-child{margin-top:0}
input,select,textarea{width:100%;padding:8px 10px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px;font-family:var(--font-sans)}
input:focus,select:focus,textarea:focus{outline:none;border-color:#185FA5}
.form2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tab-bar{display:flex;gap:0;margin-bottom:1.25rem;border-bottom:0.5px solid var(--color-border-tertiary)}
.tab{padding:8px 14px;font-size:14px;cursor:pointer;border:none;border-bottom:2px solid transparent;color:var(--color-text-secondary);background:none;font-family:var(--font-sans);margin-bottom:-1px}
.tab.active{color:#185FA5;border-bottom-color:#185FA5;font-weight:500}
.tab:hover:not(.active){color:var(--color-text-primary)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;color:var(--color-text-secondary);font-weight:500;border-bottom:0.5px solid var(--color-border-tertiary)}
td{padding:8px 10px;border-bottom:0.5px solid var(--color-border-tertiary)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--color-background-secondary)}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:var(--border-radius-md);font-weight:500}
.b-blue{background:#E6F1FB;color:#0C447C}
.b-green{background:#E1F5EE;color:#085041}
.b-amber{background:#FAEEDA;color:#633806}
.b-gray{background:#F1EFE8;color:#444441}
.b-teal{background:#E1F5EE;color:#085041}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:1rem}
.stat-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:1rem;text-align:center}
.stat-val{font-size:22px;font-weight:500}
.stat-lbl{font-size:12px;color:var(--color-text-secondary);margin-top:2px}
.alert{padding:10px 14px;border-radius:var(--border-radius-md);font-size:13px;margin-bottom:12px}
.alert-r{background:#FCEBEB;color:#A32D2D;border:0.5px solid #F09595}
.alert-g{background:#E1F5EE;color:#085041;border:0.5px solid #9FE1CB}
.avatar{width:34px;height:34px;border-radius:50%;background:#E6F1FB;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:#0C447C;flex-shrink:0}
.section-hd{font-size:15px;font-weight:500;margin-bottom:12px}
.empty{text-align:center;padding:2rem;color:var(--color-text-secondary);font-size:14px}
.chart-wrap{position:relative;height:220px;margin-top:1rem}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 0 1.25rem}
.login-wrap{display:flex;align-items:flex-start;justify-content:center;padding:1.5rem 1rem}
.login-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.75rem;width:100%;max-width:360px}
.role-tabs{display:flex;gap:8px;margin-bottom:1.25rem}
.role-tab{flex:1;padding:9px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:transparent;cursor:pointer;font-size:14px;font-family:var(--font-sans);color:var(--color-text-secondary);text-align:center;transition:all .15s}
.role-tab.active{border-color:#185FA5;background:#E6F1FB;color:#0C447C;font-weight:500}
.demo-box{margin-top:1rem;padding-top:1rem;border-top:0.5px solid var(--color-border-tertiary);font-size:12px;color:var(--color-text-secondary)}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:1rem}
.filter-row select,.filter-row input{width:auto;min-width:130px}
.pr-badge{background:#FAEEDA;color:#633806;font-size:11px;padding:1px 5px;border-radius:4px;margin-left:4px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;padding:1.5rem 1rem;z-index:100}
.modal{background:#fff;border-radius:var(--border-radius-lg);border:2px solid #1a1a1a;box-shadow:0 8px 32px rgba(0,0,0,0.35);padding:1.5rem;width:100%;max-width:440px}
.modal-title{font-size:16px;font-weight:500;margin-bottom:1rem}
.app-shell{position:relative}
.attempt-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.attempt-row input{flex:1}
.attempt-num{font-size:13px;color:var(--color-text-secondary);min-width:20px;text-align:right}
.attempts-box{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px;margin-top:8px}
.view-toggle{display:flex;gap:4px;margin-bottom:8px}
.vt-btn{padding:4px 10px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);cursor:pointer;background:transparent;font-family:var(--font-sans);color:var(--color-text-secondary)}
.vt-btn.active{background:#185FA5;color:#fff;border-color:#185FA5}
.attempts-detail{font-size:12px;color:var(--color-text-secondary)}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
// ── Supabase konfigurace ────────────────────────────────────
const SB_URL='https://ytfdorfwmkwesjhdkfhz.supabase.co';
const SB_KEY='sb_publishable_0VC3aK8r6v6NQWU1l75otA_TYOhSgLg';

async function sbGet(table, params=''){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?${params}`,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbInsert(table, body){
  const r=await fetch(`${SB_URL}/rest/v1/${table}`,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(body)});
  if(!r.ok) throw new Error(await r.text());
}
async function sbDelete(table, match){
  const params=Object.entries(match).map(([k,v])=>`${k}=eq.${encodeURIComponent(v)}`).join('&');
  const r=await fetch(`${SB_URL}/rest/v1/${table}?${params}`,{method:'DELETE',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
  if(!r.ok) throw new Error(await r.text());
}

// ── Globální stav ───────────────────────────────────────────
let D={users:[],measureTypes:[],records:[]};
let CU=null,CR=null,perfChart=null,coachPerfChart=null;
let _confirmCb=null;

async function loadAll(){
  showLoading(true);
  try{
    const [users,mt,recs]=await Promise.all([
      sbGet('users','select=*'),
      sbGet('measure_types','select=*'),
      sbGet('records','select=*')
    ]);
    D.users=users;
    D.measureTypes=mt.map(m=>({...m}));
    D.records=recs.map(r=>({...r,attempts:Array.isArray(r.attempts)?r.attempts:JSON.parse(r.attempts)}));
  }catch(e){
    alert('Chyba připojení k databázi: '+e.message);
  }
  showLoading(false);
}

function showLoading(on){
  let el=document.getElementById('loading-overlay');
  if(!el){
    el=document.createElement('div');
    el.id='loading-overlay';
    el.style.cssText='position:fixed;inset:0;background:rgba(255,255,255,0.85);display:flex;align-items:center;justify-content:center;z-index:999;font-size:14px;color:#185FA5';
    el.innerHTML='<div>Načítám data…</div>';
    document.body.appendChild(el);
  }
  el.style.display=on?'flex':'none';
}

function save(){}

function fd(d){ if(!d)return''; const p=d.split('-'); return p[2]+'.'+p[1]+'.'+p[0]; }
function mt(id){ return D.measureTypes.find(m=>m.id===id); }
function au(id){ return D.users.find(u=>u.id===id); }
function best(rec){ const m=mt(rec.type); return m&&m.lib ? Math.min(...rec.attempts) : Math.max(...rec.attempts); }
function avg(rec){ return rec.attempts.reduce((a,b)=>a+b,0)/rec.attempts.length; }
function fmtVal(v,unit){ return parseFloat(v.toFixed(3))+' '+unit; }

async function doLogin(){
  const u=document.getElementById('login-user').value.trim();
  const p=document.getElementById('login-pass').value;
  const la=document.getElementById('login-alert');
  la.innerHTML='<div class="alert" style="background:#E6F1FB;color:#0C447C;border:0.5px solid #185FA5">Přihlašuji…</div>';
  await loadAll();
  const user=D.users.find(x=>x.id===u&&x.pass===p);
  if(!user){ la.innerHTML='<div class="alert alert-r">Nesprávné přihlašovací údaje</div>'; return; }
  la.innerHTML='';
  CU=user; CR=user.role;
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('main-app').classList.remove('hidden');
  document.getElementById('app-sub').textContent=user.name+(CR==='admin'?' (Admin)':CR==='coach'?' (Trenér)':''
  );
  if(CR==='coach'||CR==='admin'){ 
    document.getElementById('coach-view').classList.remove('hidden');
    if(CR==='admin') document.getElementById('ct-coaches').classList.remove('hidden');
    renderDashboard(); 
  }
  else { document.getElementById('athlete-view').classList.remove('hidden'); renderResults(); }
}

function doLogout(){
  CU=null; CR=null;
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('main-app').classList.add('hidden');
  document.getElementById('coach-view').classList.add('hidden');
  document.getElementById('athlete-view').classList.add('hidden');
  document.getElementById('ct-coaches').classList.add('hidden');
  document.getElementById('login-user').value='';
  document.getElementById('login-pass').value='';
  if(perfChart){perfChart.destroy();perfChart=null;}
  if(coachPerfChart){coachPerfChart.destroy();coachPerfChart=null;}
}

function cTab(name){
  ['dashboard','add','coachchart','athletes','settings','coaches'].forEach(t=>{
    const btn=document.getElementById('ct-'+t);
    const div=document.getElementById('cv-'+t);
    if(btn) btn.classList.toggle('active',t===name);
    if(div) div.classList.toggle('hidden',t!==name);
  });
  closeModal();
  if(name==='dashboard') renderDashboard();
  else if(name==='add') renderAddForm();
  else if(name==='coachchart') renderCoachChart();
  else if(name==='athletes') renderAthletes();
  else if(name==='settings') renderSettings();
  else if(name==='coaches') renderCoaches();
}

function aTab(name){
  ['results','chart','addperf'].forEach(t=>{
    document.getElementById('at-'+t).classList.toggle('active',t===name);
    document.getElementById('av-'+t).classList.toggle('hidden',t!==name);
  });
  if(name==='chart') renderChart();
  else if(name==='addperf') renderAthleteAddForm();
}

function attemptsHTML(rec, mode){
  const b=best(rec), a=avg(rec);
  const m=mt(rec.type);
  if(rec.attempts.length===1) return `<strong>${fmtVal(rec.attempts[0],rec.unit)}</strong>`;
  if(mode==='best') return `<strong>${fmtVal(b,rec.unit)}</strong> <span class="badge b-amber">nejlepší</span>`;
  if(mode==='avg') return `<strong>${fmtVal(a,rec.unit)}</strong> <span class="badge b-teal">průměr</span>`;
  return `<span class="attempts-detail">${rec.attempts.map((v,i)=>`${i+1}: ${v}`).join(' | ')}</span>`;
}

// ── Confirm modal ──────────────────────────────────────────
function askConfirm(msg, cb){
  _confirmCb=cb;
  const el=document.getElementById('confirm-modal');
  document.getElementById('confirm-msg').textContent=msg;
  el.classList.remove('hidden');
}
function confirmYes(){ document.getElementById('confirm-modal').classList.add('hidden'); if(_confirmCb) _confirmCb(); _confirmCb=null; }
function confirmNo(){ document.getElementById('confirm-modal').classList.add('hidden'); _confirmCb=null; }

// ── Dashboard ───────────────────────────────────────────────
let dashVM='best', dashAth='';
function renderDashboard(){
  const athletes=D.users.filter(u=>u.role==='athlete');
  const coaches=D.users.filter(u=>u.role==='coach');
  document.getElementById('cv-dashboard').innerHTML=`
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-val">${athletes.length}</div><div class="stat-lbl">Svěřenci</div></div>
      ${CR==='admin'?`<div class="stat-card"><div class="stat-val">${coaches.length}</div><div class="stat-lbl">Trenéři</div></div>`:''}
      <div class="stat-card"><div class="stat-val">${D.records.length}</div><div class="stat-lbl">Záznamy</div></div>
      <div class="stat-card"><div class="stat-val">${D.measureTypes.length}</div><div class="stat-lbl">Disciplíny</div></div>
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px">
        <div class="section-hd" style="margin:0">Záznamy</div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <select id="dash-ath" onchange="dashFilterChange()" style="width:auto;min-width:140px">
            <option value="">Všichni svěřenci</option>
            ${athletes.map(a=>`<option value="${a.id}" ${dashAth===a.id?'selected':''}>${a.name}</option>`).join('')}
          </select>
          <div class="view-toggle">
            <button class="vt-btn ${dashVM==='best'?'active':''}" onclick="setDashVM('best')">Nejlepší</button>
            <button class="vt-btn ${dashVM==='avg'?'active':''}" onclick="setDashVM('avg')">Průměr</button>
            <button class="vt-btn ${dashVM==='all'?'active':''}" onclick="setDashVM('all')">Vše</button>
          </div>
        </div>
      </div>
      <div id="dash-table"></div>
    </div>`;
  renderDashTable();
}
function dashFilterChange(){
  dashAth=document.getElementById('dash-ath').value;
  renderDashTable();
}
function setDashVM(m){
  dashVM=m;
  document.querySelectorAll('#cv-dashboard .vt-btn').forEach(b=>{
    b.classList.toggle('active',b.textContent===(m==='best'?'Nejlepší':m==='avg'?'Průměr':'Vše'));
  });
  renderDashTable();
}
function renderDashTable(){
  let recs=[...D.records].sort((a,b)=>b.date.localeCompare(a.date));
  if(dashAth) recs=recs.filter(r=>r.ath===dashAth);
  const el=document.getElementById('dash-table');
  if(!recs.length){ el.innerHTML='<div class="empty">Žádné záznamy</div>'; return; }
  el.innerHTML=`<div style="overflow-x:auto"><table>
    <thead><tr><th>Datum</th><th>Svěřenec</th><th>Disciplína</th><th>Pok.</th><th>Výkon</th><th></th></tr></thead>
    <tbody>${recs.map(r=>{
      const a=au(r.ath), m=mt(r.type);
      const ini=(a?a.name:'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      return `<tr>
        <td>${fd(r.date)}</td>
        <td><div style="display:flex;align-items:center;gap:6px">
          <div class="avatar" style="width:26px;height:26px;font-size:10px">${ini}</div>
          ${a?a.name:r.ath}
        </div></td>
        <td><span class="badge b-blue">${m?m.name:r.type}</span></td>
        <td style="color:var(--color-text-secondary)">${r.attempts.length}x</td>
        <td>${attemptsHTML(r,dashVM)}</td>
        <td><button class="btn btn-sm btn-danger" onclick="delRec('${r.id}')">Smazat</button></td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

function delRec(id){
  askConfirm('Smazat tento záznam výkonu?', async ()=>{
    try{ await sbDelete('records',{id}); D.records=D.records.filter(r=>r.id!==id); renderDashboard(); }
    catch(e){ alert('Chyba smazání: '+e.message); }
  });
}

let attemptCount=1;
function renderAddForm(){
  attemptCount=1;
  const athletes=D.users.filter(u=>u.role==='athlete');
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('cv-add').innerHTML=`
    <div class="card">
      <div class="section-hd">Nový výkon</div>
      <div id="add-alert"></div>
      <div class="form2">
        <div>
          <label>Svěřenec</label>
          <select id="f-ath">${athletes.map(a=>`<option value="${a.id}">${a.name}</option>`).join('')}</select>
        </div>
        <div>
          <label>Datum</label>
          <input type="date" id="f-date" value="${today}">
        </div>
      </div>
      <div class="form2">
        <div>
          <label>Disciplína</label>
          <select id="f-type" onchange="fillUnit()">${D.measureTypes.map(m=>`<option value="${m.id}" data-unit="${m.unit}">${m.name}</option>`).join('')}</select>
        </div>
        <div>
          <label>Jednotka</label>
          <input type="text" id="f-unit" placeholder="s, cm, m, kg">
        </div>
      </div>
      <label>Pokusy / hodnoty</label>
      <div class="attempts-box">
        <div id="attempts-inputs">
          <div class="attempt-row"><span class="attempt-num">1.</span><input type="number" step="0.01" class="attempt-val" placeholder="0.00"></div>
        </div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="btn btn-sm" onclick="addAttempt()">+ Přidat pokus</button>
          <button class="btn btn-sm btn-danger" onclick="removeAttempt()" id="btn-remove-att" style="display:none">- Odebrat</button>
        </div>

function setVM(m){
  viewMode=m;
  ['best','avg','all'].forEach(v=>document.getElementById('vm-'+v).classList.toggle('active',v===m));
  filterResults();
}

function filterResults(){
  const tf=document.getElementById('flt-type').value;
  const ff=document.getElementById('flt-from').value;
  const ft=document.getElementById('flt-to').value;
  let recs=D.records.filter(r=>r.ath===CU.id);
  if(tf) recs=recs.filter(r=>r.type===tf);
  if(ff) recs=recs.filter(r=>r.date>=ff);
  if(ft) recs=recs.filter(r=>r.date<=ft);
  recs=recs.sort((a,b)=>b.date.localeCompare(a.date));

  const allRecs=D.records.filter(r=>r.ath===CU.id);
  const prMap={};
  [...new Set(allRecs.map(r=>r.type))].forEach(tid=>{
    const m=mt(tid);
    const tr=allRecs.filter(r=>r.type===tid);
    if(!tr.length) return;
    const bests=tr.map(r=>best(r));
    prMap[tid]=m&&m.lib ? Math.min(...bests) : Math.max(...bests);
  });

  const el=document.getElementById('res-table');
  if(!recs.length){ el.innerHTML='<div class="empty">Žádné záznamy</div>'; return; }
  el.innerHTML=`<div style="overflow-x:auto"><table>
    <thead><tr><th>Datum</th><th>Disciplína</th><th>Pok.</th><th>Výkon</th><th>Poznámka</th></tr></thead>
    <tbody>${recs.map(r=>{
      const m=mt(r.type);
      const b=best(r);
      const isPR=prMap[r.type]===b;
      return `<tr>
        <td>${fd(r.date)}</td>
        <td><span class="badge b-blue">${m?m.name:r.type}</span></td>
        <td style="color:var(--color-text-secondary);font-size:12px">${r.attempts.length}x</td>
        <td>${attemptsHTML(r,viewMode)}${isPR&&viewMode!=='all'?'<span class="pr-badge">PR</span>':''}</td>
        <td style="color:var(--color-text-secondary);font-size:12px">${r.note||''}</td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

  const type=document.getElementById('af-type').value;
  const unit=document.getElementById('af-unit').value.trim();
  const note=document.getElementById('af-note').value.trim();
  const inputs=document.querySelectorAll('.ath-attempt-val');
  const attempts=[];
  inputs.forEach(inp=>{ const v=parseFloat(inp.value); if(!isNaN(v)) attempts.push(v); });
  const aa=document.getElementById('ath-add-alert');
  if(!date||!type||!unit||attempts.length===0){
    aa.innerHTML='<div class="alert alert-r">Vyplňte všechna povinná pole a alespoň jeden pokus</div>'; return;
  }
  aa.innerHTML='<div class="alert" style="background:#E6F1FB;color:#0C447C;border:0.5px solid #185FA5">Ukládám…</div>';
  const rec={id:'r'+Date.now(),ath:CU.id,type,attempts,unit,date,note};
  try{
    await sbInsert('records',rec);
    D.records.push(rec);
    aa.innerHTML=`<div class="alert alert-g">Výkon uložen! ${attempts.length} pokus${attempts.length>1?'ů':''}</div>`;
    setTimeout(()=>{ renderAthleteAddForm(); },1500);
  }catch(e){ aa.innerHTML='<div class="alert alert-r">Chyba uložení: '+e.message+'</div>'; }
}

document.getElementById('login-pass').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
</script>
