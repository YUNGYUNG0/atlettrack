<script>
// ── Supabase konfigurace ────────────────────────────────────
const SB_URL='https://ytfdorfwmkwesjhdkfhz.supabase.co';
const SB_KEY='sb_publishable_0VC3aK8r6v6NQWU1l75otA_TYOhSgLg';

async function sbGet(table, params=''){
  const r=await fetch(`${SB_URL}/rest/v1/${table}?${params}`,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbInsert(table, body){
  const r=await fetch(`${SB_URL}/rest/v1/${table}`,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify(body)});
  if(!r.ok) throw new Error(await r.text());
}
async function sbDelete(table, match){
  const params=Object.entries(match).map(([k,v])=>`${k}=eq.${encodeURIComponent(v)}`).join('&');
  const r=await fetch(`${SB_URL}/rest/v1/${table}?${params}`,{method:'DELETE',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
  if(!r.ok) throw new Error(await r.text());
}

// ── Globální stav ───────────────────────────────────────────
let D={users:[],measureTypes:[],records:[]};
let CU=null,CR=null,perfChart=null,coachPerfChart=null;
let _confirmCb=null;

async function loadAll(){
  showLoading(true);
  try{
    const [users,mt,recs]=await Promise.all([
      sbGet('users','select=*'),
      sbGet('measure_types','select=*'),
      sbGet('records','select=*')
    ]);
    D.users=users;
    D.measureTypes=mt.map(m=>({...m}));
    D.records=recs.map(r=>({
      ...r,
      attempts:Array.isArray(r.attempts)?r.attempts:JSON.parse(r.attempts),
      metrics:Array.isArray(r.metrics)?r.metrics:(r.metrics?JSON.parse(r.metrics):[]),
      series:Array.isArray(r.series)?r.series:(r.series?JSON.parse(r.series):null)
    }));
    const metricTypesRaw=await sbGet('metric_types','select=*');
    D.metricTypes=metricTypesRaw||[];
  }catch(e){
    alert('Chyba připojení k databázi: '+e.message);
  }
  showLoading(false);
}

function showLoading(on){
  let el=document.getElementById('loading-overlay');
  if(!el){
    el=document.createElement('div');
    el.id='loading-overlay';
    el.style.cssText='position:fixed;inset:0;background:rgba(255,255,255,0.85);display:flex;align-items:center;justify-content:center;z-index:999;font-size:14px;color:#185FA5';
    el.innerHTML='<div>Načítám data…</div>';
    document.body.appendChild(el);
  }
  el.style.display=on?'flex':'none';
}

function save(){}
function togglePassVis(id,btn){
  const inp=document.getElementById(id);
  if(!inp) return;
  inp.type=inp.type==='password'?'text':'password';
  btn.textContent=inp.type==='password'?'👁':'🙈';
}

function fd(d){ if(!d)return''; const p=d.split('-'); return p[2]+'.'+p[1]+'.'+p[0]; }
function mt(id){ return D.measureTypes.find(m=>m.id===id); }
function au(id){ return D.users.find(u=>u.id===id); }
function getAllAttempts(rec){
  if(rec.series&&rec.series.length) return rec.series.flatMap(s=>s.attempts||[]);
  return rec.attempts||[];
}
function best(rec){ const m=mt(rec.type); const all=getAllAttempts(rec); return m&&m.lib ? Math.min(...all) : Math.max(...all); }
function avg(rec){
  const all=getAllAttempts(rec);
  const sum=all.reduce((a,b)=>a+b,0);
  const raw=sum/all.length;
  // round to max decimal places used in source values
  const maxDec=Math.max(...all.map(v=>{
    const s=v.toString();
    const d=s.indexOf('.');
    return d>=0?s.length-d-1:0;
  }));
  return parseFloat(raw.toFixed(maxDec));
}
function fmtVal(v,unit){ return parseFloat(v.toFixed(3))+' '+unit; }

async function doLogin(){
  const u=document.getElementById('login-user').value.trim();
  const p=document.getElementById('login-pass').value;
  const la=document.getElementById('login-alert');
  la.innerHTML='<div class="alert" style="background:#E6F1FB;color:#0C447C;border:0.5px solid #185FA5">Přihlašuji…</div>';
  await loadAll();
  const user=D.users.find(x=>x.id===u&&x.pass===p);
  if(!user){ la.innerHTML='<div class="alert alert-r">Nesprávné přihlašovací údaje</div>'; return; }
  la.innerHTML='';
  CU=user; CR=user.role;
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('main-app').classList.remove('hidden');
  document.getElementById('app-sub').textContent=user.name+(CR==='admin'?' (Admin)':CR==='coach'?' (Trenér)':''
  );
  if(CR==='coach'||CR==='admin'){ 
    document.getElementById('coach-view').classList.remove('hidden');
    if(CR==='admin') document.getElementById('ct-coaches').classList.remove('hidden');
    renderDashboard(); 
  }
  else { document.getElementById('athlete-view').classList.remove('hidden'); renderResults(); }
}

function doLogout(){
  CU=null; CR=null;
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('main-app').classList.add('hidden');
  document.getElementById('coach-view').classList.add('hidden');
  document.getElementById('athlete-view').classList.add('hidden');
  document.getElementById('ct-coaches').classList.add('hidden');
  document.getElementById('login-user').value='';
  document.getElementById('login-pass').value='';
  if(perfChart){perfChart.destroy();perfChart=null;}
  if(coachPerfChart){coachPerfChart.destroy();coachPerfChart=null;}
}

function cTab(name){
  ['dashboard','add','coachchart','athletes','settings','coaches'].forEach(t=>{
    const btn=document.getElementById('ct-'+t);
    const div=document.getElementById('cv-'+t);
    if(btn) btn.classList.toggle('active',t===name);
    if(div) div.classList.toggle('hidden',t!==name);
  });
  closeModal();
  if(name==='dashboard') renderDashboard();
  else if(name==='add') renderAddForm();
  else if(name==='coachchart') renderCoachChart();
  else if(name==='athletes') renderAthletes();
  else if(name==='settings') renderSettings();
  else if(name==='coaches') renderCoaches();
}

function aTab(name){
  ['results','chart','addperf'].forEach(t=>{
    document.getElementById('at-'+t).classList.toggle('active',t===name);
    document.getElementById('av-'+t).classList.toggle('hidden',t!==name);
  });
  if(name==='chart') renderChart();
  else if(name==='addperf') renderAthleteAddForm();
}

function attemptsHTML(rec, mode){
  const b=best(rec), a=avg(rec);
  if(rec.attempts.length===1) return `<strong>${fmtVal(rec.attempts[0],rec.unit)}</strong>`;
  if(mode==='best') return `<strong>${fmtVal(b,rec.unit)}</strong> <span class="badge b-amber">nejlepší</span>`;
  if(mode==='avg') return `<strong>${fmtVal(a,rec.unit)}</strong> <span class="badge b-teal">průměr</span>`;
  // 'all' mode - per attempt rows with metrics aligned in columns
  const perAttemptMetrics={};
  (rec.metrics||[]).filter(me=>me.scope==='per_attempt').forEach(me=>{
    const ai=(me.attempt||1);
    if(!perAttemptMetrics[ai]) perAttemptMetrics[ai]=[];
    perAttemptMetrics[ai].push(me);
  });
  const allMetricNames=[...new Set((rec.metrics||[]).filter(me=>me.scope==='per_attempt').map(me=>me.name))];
  // build grid: col0=num, col1=value, col2..N=metric columns
  const dataRows=rec.attempts.map((v,i)=>{
    const ai=i+1;
    const mets=perAttemptMetrics[ai]||[];
    const metricsByName={};
    mets.forEach(me=>{ metricsByName[me.name]=me; });
    const metParts=allMetricNames.map(mn=>{
      const me=metricsByName[mn];
      return me
        ? `<span style="font-size:11px;background:#eef4fb;border:1px solid #bfdbfe;border-radius:4px;padding:1px 6px;color:#1e40af;margin-left:6px"><b>${mn}:</b> ${me.value} ${me.unit}</span>`
        : `<span style="font-size:11px;color:#bbb;margin-left:6px">${mn}: —</span>`;
    }).join('');
    const isLast=i===rec.attempts.length-1;
    return `<div style="display:flex;align-items:center;padding:4px 0;${isLast?'':'border-bottom:1px solid #e8eaed'}">
      <span style="font-size:12px;color:#888;min-width:20px">${ai}.</span>
      <strong style="font-size:13px;min-width:70px">${v} ${rec.unit}</strong>
      ${metParts}
    </div>`;
  }).join('');
  return `<div>${dataRows}</div>`;
}

// ── Confirm modal ──────────────────────────────────────────
function askConfirm(msg, cb){
  _confirmCb=cb;
  const el=document.getElementById('confirm-modal');
  document.getElementById('confirm-msg').textContent=msg;
  el.classList.remove('hidden');
}
function confirmYes(){ document.getElementById('confirm-modal').classList.add('hidden'); if(_confirmCb) _confirmCb(); _confirmCb=null; }
function confirmNo(){ document.getElementById('confirm-modal').classList.add('hidden'); _confirmCb=null; }

// ── Dashboard ───────────────────────────────────────────────
let dashVM='best', dashAth='';
function renderDashboard(){
  const athletes=D.users.filter(u=>u.role==='athlete');
  const coaches=D.users.filter(u=>u.role==='coach');
  document.getElementById('cv-dashboard').innerHTML=`
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-val">${athletes.length}</div><div class="stat-lbl">Svěřenci</div></div>
      ${CR==='admin'?`<div class="stat-card"><div class="stat-val">${coaches.length}</div><div class="stat-lbl">Trenéři</div></div>`:''}
      <div class="stat-card"><div class="stat-val">${D.records.length}</div><div class="stat-lbl">Záznamy</div></div>
      <div class="stat-card"><div class="stat-val">${D.measureTypes.length}</div><div class="stat-lbl">Disciplíny</div></div>
    </div>
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px">
        <div class="section-hd" style="margin:0">Záznamy</div>
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <select id="dash-ath" onchange="dashFilterChange()" style="width:auto;min-width:140px">
            <option value="">Všichni svěřenci</option>
            ${athletes.map(a=>`<option value="${a.id}" ${dashAth===a.id?'selected':''}>${a.name}</option>`).join('')}
          </select>
          <select id="dash-type" onchange="dashFilterChange()" style="width:auto;min-width:140px">
            <option value="">Všechny disciplíny</option>
            ${D.measureTypes.map(m=>`<option value="${m.id}" ${dashType===m.id?'selected':''}>${m.name}</option>`).join('')}
          </select>
          <div class="view-toggle">
            <button class="vt-btn ${dashVM==='best'?'active':''}" onclick="setDashVM('best')">Nejlepší</button>
            <button class="vt-btn ${dashVM==='avg'?'active':''}" onclick="setDashVM('avg')">Průměr</button>
            <button class="vt-btn ${dashVM==='all'?'active':''}" onclick="setDashVM('all')">Vše</button>
          </div>
        </div>
      </div>
      <div id="dash-table"></div>
    </div>`;
  renderDashTable();
}
function dashFilterChange(){
  dashAth=document.getElementById('dash-ath').value;
  dashType=document.getElementById('dash-type')?.value||'';
  renderDashTable();
}
function setDashVM(m){
  dashVM=m;
  document.querySelectorAll('#cv-dashboard .vt-btn').forEach(b=>{
    b.classList.toggle('active',b.textContent===(m==='best'?'Nejlepší':m==='avg'?'Průměr':'Vše'));
  });
  renderDashTable();
}
function renderDashTable(){
  let recs=[...D.records].sort((a,b)=>b.date.localeCompare(a.date));
  if(dashAth) recs=recs.filter(r=>r.ath===dashAth);
  if(dashType) recs=recs.filter(r=>r.type===dashType);
  const el=document.getElementById('dash-table');
  if(!recs.length){ el.innerHTML='<div class="empty">Žádné záznamy</div>'; return; }
  el.innerHTML=`<div style="overflow-x:auto"><table>

let seriesCount={coach:0, ath:0};

function addSeries(prefix){
  seriesCount[prefix]=(seriesCount[prefix]||0)+1;
  const sn=seriesCount[prefix];
  const container=document.getElementById(`series-container-${prefix}`);
  const div=document.createElement('div');
  div.id=`${prefix}-series-${sn}`;
  div.style.cssText='margin-bottom:10px;border:1.5px solid #d0d5dd;border-radius:8px;padding:10px;background:#fafafa';
  div.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div style="font-size:13px;font-weight:700;color:#444">Série ${sn}</div>
      <button class="btn btn-sm btn-danger" onclick="removeSeries('${prefix}',${sn})">× Odebrat sérii</button>
    </div>
    <div id="${prefix}-series-attempts-${sn}">
      ${attemptRowHTML(1,`${prefix}-s${sn}`)}
    </div>
    <div style="display:flex;gap:8px;margin-top:6px">
      <button class="btn btn-sm" onclick="addSeriesAttempt('${prefix}',${sn})">+ Pokus</button>
      <button class="btn btn-sm btn-danger" id="${prefix}-s${sn}-rem-btn" style="display:none" onclick="removeSeriesAttempt('${prefix}',${sn})">- Odebrat</button>
    </div>
    <div style="margin-top:8px;border-top:1px solid #e8eaed;padding-top:8px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:12px;color:#666;font-weight:600">Metriky série</span>
        <button class="btn btn-sm" onclick="addSessionMetric('${prefix}-s${sn}')">+ metrika</button>
      </div>
      <div id="session-metrics-${prefix}-s${sn}"></div>
    </div>`;
  container.appendChild(div);
  // init attempt count for this series
  if(!window._sCounts) window._sCounts={};
  window._sCounts[`${prefix}-s${sn}`]=1;
}

function removeSeries(prefix, sn){
  const el=document.getElementById(`${prefix}-series-${sn}`);
  if(el) el.remove();
}

function addSeriesAttempt(prefix, sn){
  const sp=`${prefix}-s${sn}`;
  if(!window._sCounts) window._sCounts={};
  window._sCounts[sp]=(window._sCounts[sp]||1)+1;
  const n=window._sCounts[sp];
  const box=document.getElementById(`${prefix}-series-attempts-${sn}`);
  const div=document.createElement('div');
  div.innerHTML=attemptRowHTML(n,sp);
  box.appendChild(div.firstElementChild);
  const remBtn=document.getElementById(`${sp}-rem-btn`);
  if(remBtn) remBtn.style.display=n>1?'':'none';
}

function removeSeriesAttempt(prefix, sn){
  const sp=`${prefix}-s${sn}`;
  if(!window._sCounts||window._sCounts[sp]<=1) return;
  const box=document.getElementById(`${prefix}-series-attempts-${sn}`);
  box.removeChild(box.lastChild);
  window._sCounts[sp]--;
  const remBtn=document.getElementById(`${sp}-rem-btn`);
  if(remBtn) remBtn.style.display=window._sCounts[sp]>1?'':'none';
}

function collectSeries(prefix){
  const container=document.getElementById(`series-container-${prefix}`);
  if(!container) return null;
  const seriesDivs=container.querySelectorAll(`[id^="${prefix}-series-"]`);
  if(!seriesDivs.length) return null;
  const series=[];
  seriesDivs.forEach(div=>{
    const sn=div.id.replace(`${prefix}-series-`,'');
    const sp=`${prefix}-s${sn}`;
    const attempts=[];
    div.querySelectorAll('.attempt-val').forEach(inp=>{ const v=parseFloat(inp.value); if(!isNaN(v)) attempts.push(v); });
    const metrics=[];
    div.querySelectorAll('.am-val').forEach(inp=>{
      const v=parseFloat(inp.value); if(isNaN(v)) return;
      const sel=inp.closest('div[id]')?.querySelector('select'); if(!sel?.dataset.metricId) return;
      metrics.push({id:sel.dataset.metricId,name:sel.dataset.metricName,unit:sel.dataset.metricUnit,value:v,scope:'per_attempt',attempt:parseInt(inp.dataset.attempt)||1});
    });
    div.querySelectorAll('.sm-val').forEach(inp=>{
      const v=parseFloat(inp.value); if(isNaN(v)) return;
      const sel=inp.closest('div[id]')?.querySelector('select'); if(!sel?.dataset.metricId) return;
      metrics.push({id:sel.dataset.metricId,name:sel.dataset.metricName,unit:sel.dataset.metricUnit,value:v,scope:'session'});
    });
    if(attempts.length) series.push({attempts,metrics});
  });
  return series.length?series:null;
}

function attemptRowHTML(num, prefix){
  return `<div class="attempt-row" id="${prefix}-attempt-row-${num}" style="flex-wrap:wrap;align-items:flex-start;padding:6px 0;border-bottom:1px solid #f0f0f0">
    <span class="attempt-num" style="margin-top:8px">${num}.</span>
    <input type="number" step="0.01" class="attempt-val" placeholder="0.00" style="width:120px;flex-shrink:0">
    <button class="btn btn-sm" style="font-size:11px;padding:4px 10px;margin-top:2px;flex-shrink:0" onclick="addAttemptMetric('${prefix}',${num})">+ metrika</button>
    <div id="${prefix}-attempt-metrics-${num}" style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;width:100%;padding-left:28px"></div>
  </div>`;
}

function addAttemptMetric(prefix, num){
  const container=document.getElementById(`${prefix}-attempt-metrics-${num}`);
  const mid='am-'+Date.now();
  const metricOpts=D.metricTypes&&D.metricTypes.length
    ? `<option value="">— vyber —</option>${D.metricTypes.map(m=>`<option value="${m.id}" data-name="${m.name}" data-unit="${m.unit}">${m.name} (${m.unit})</option>`).join('')}<option value="__new__">+ Nová…</option>`
    : `<option value="__new__">+ Nová metrika…</option>`;
  const div=document.createElement('div');
  div.style.cssText='display:inline-flex;gap:4px;align-items:center;margin-top:4px;background:#eef4fb;border:1px solid #bfdbfe;border-radius:6px;padding:4px 6px';
  div.id=mid;
  div.innerHTML=`
    <select style="width:auto;min-width:130px;font-size:12px;padding:4px 6px;border:1px solid #d0d5dd;border-radius:6px" onchange="onAttemptMetricSelect(this,'${mid}')">

    <span class="am-unit" style="font-size:11px;color:#555;min-width:20px"></span>
    <button style="background:none;border:none;cursor:pointer;color:#A32D2D;font-size:14px;padding:0 2px;line-height:1" onclick="document.getElementById('${mid}').remove()">×</button>`;

function onAttemptMetricSelect(sel, mid){
  const div=document.getElementById(mid);
  if(sel.value==='__new__'){
    const name=prompt('Název metriky (např. Laktát):');
    if(!name){sel.value='';return;}
    const unit=prompt('Jednotka (např. mmol):');
    if(!unit){sel.value='';return;}
    const id='mt-'+name.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'')+'-'+Date.now();
    if(!D.metricTypes) D.metricTypes=[];
    D.metricTypes.push({id,name,unit});
    // save to supabase async
    sbInsert('metric_types',{id,name,unit}).catch(e=>console.warn('metric save:',e));
    // add option to all selects
    document.querySelectorAll('select[onchange^="onAttemptMetricSelect"], select[onchange^="onSessionMetricSelect"]').forEach(s=>{
      const newOpt=new Option(`${name} (${unit})`,id);
      newOpt.dataset.name=name; newOpt.dataset.unit=unit;
      s.insertBefore(newOpt, s.querySelector('option[value="__new__"]'));
      if(s===sel) s.value=id;
    });
    div.querySelector('.am-unit').textContent=unit;
    div.querySelector('select').dataset.metricId=id;
    div.querySelector('select').dataset.metricName=name;
    div.querySelector('select').dataset.metricUnit=unit;
  } else if(sel.value){
    const opt=sel.options[sel.selectedIndex];
    div.querySelector('.am-unit').textContent=opt.dataset.unit||'';
    sel.dataset.metricId=sel.value;
    sel.dataset.metricName=opt.dataset.name||opt.text;
    sel.dataset.metricUnit=opt.dataset.unit||'';
  }
}

async function saveRec(){
  const ath=document.getElementById('f-ath').value;
  const date=document.getElementById('f-date').value;
  const type=document.getElementById('f-type').value;
  const unit=document.getElementById('f-unit').value.trim();
  const note=document.getElementById('f-note').value.trim();

  const aa=document.getElementById('add-alert');
  if(!ath||!date||!type||!unit||attempts.length===0){
    aa.innerHTML='<div class="alert alert-r">Vyplňte všechna povinná pole a alespoň jeden pokus</div>'; return;
  }
  aa.innerHTML='<div class="alert" style="background:#E6F1FB;color:#0C447C;border:0.5px solid #185FA5">Ukládám…</div>';
  const seriesData=collectSeries('coach');
  let attempts=[], metrics=[];
  if(seriesData){
    attempts=seriesData.flatMap(s=>s.attempts);
    metrics=seriesData.flatMap(s=>s.metrics);
  } else {
    document.querySelectorAll('#cv-add .attempt-val').forEach(inp=>{ const v=parseFloat(inp.value); if(!isNaN(v)) attempts.push(v); });
  }
  const rec={id:'r'+Date.now(),ath,type,attempts,unit,date,note,metrics,series:seriesData};
  try{
    await sbInsert('records',{...rec,series:rec.series?JSON.stringify(rec.series):null});
    D.records.push(rec);
    aa.innerHTML=`<div class="alert alert-g">Výkon uložen! ${attempts.length} pokus${attempts.length>1?'ů':''}</div>`;
    setTimeout(()=>{ renderAddForm(); },1500);
  }catch(e){ aa.innerHTML='<div class="alert alert-r">Chyba uložení: '+e.message+'</div>'; }
}

async function saveProfile(uid){
  const name=document.getElementById('p-name').value.trim();
  const pass=document.getElementById('p-pass').value;
  const ma=document.getElementById('m-alert');
  if(!name||!pass){ ma.innerHTML='<div class="alert alert-r">Vyplňte jméno a heslo</div>'; return; }
  ma.innerHTML='<div class="alert" style="background:#E6F1FB;color:#0C447C;border:0.5px solid #185FA5">Ukládám…</div>';
  try{
    // Supabase UPDATE
    const r=await fetch(`${SB_URL}/rest/v1/users?id=eq.${encodeURIComponent(uid)}`,{
      method:'PATCH',
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
      body:JSON.stringify({name,pass})
    });
    if(!r.ok) throw new Error(await r.text());
    const u=D.users.find(x=>x.id===uid);
    if(u){ u.name=name; u.pass=pass; }
    closeModal();
    // re-render whichever tab is active
    renderAthletes(); renderCoaches();

}

function filterResults(){

  let recs=D.records.filter(r=>r.ath===CU.id);

  if(ff) recs=recs.filter(r=>r.date>=ff);

  recs=recs.sort((a,b)=>b.date.localeCompare(a.date));

  const allRecs=D.records.filter(r=>r.ath===CU.id);
  const prMap={};
  [...new Set(allRecs.map(r=>r.type))].forEach(tid=>{
    const m=mt(tid);
    const tr=allRecs.filter(r=>r.type===tid);
    if(!tr.length) return;
    const bests=tr.map(r=>best(r));
    prMap[tid]=m&&m.lib ? Math.min(...bests) : Math.max(...bests);

  const el=document.getElementById('res-table');

      return `<tr>

        <td><span class="badge b-blue">${m?m.name:r.type}</span></td>
        <td style="color:#666;font-size:12px">${r.attempts.length}x</td>
        <td>${attemptsHTML(r,viewMode)}${isPR&&viewMode!=='all'?'<span class="pr-badge">PR</span>':''}</td>

function buildChartConfig(groupedRecs, vals, mode, unit){
  const uniqueYs=[...new Set(vals.map(v=>parseFloat(v.toFixed(6))))].sort((a,b)=>a-b);
  const minY=Math.min(...uniqueYs);
  const maxY=Math.max(...uniqueYs);
  const pad=(maxY-minY)*0.15||0.1;
  const scatterData=groupedRecs.map((r,i)=>({x:new Date(r.date).getTime(), y:vals[i], gi:i}));
  return {
    scatterData,
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{
            title:(items)=>fd(groupedRecs[items[0].raw.gi].date),
            label:(c)=>{
              const r=groupedRecs[c.raw.gi];
              const lines=[];
              const allAtts=getAllAttempts(r);
              allAtts.forEach((v,i)=>{
                const isBest=mode==='best'&&v===best(r);
                lines.push(`${isBest?'▶':'  '} Pokus ${i+1}: ${v} ${r.unit}`);
              });
              if(mode==='avg') lines.push(`─── Průměr: ${avg(r)} ${r.unit}`);
              const sm=(r.metrics||[]).filter(me=>me.scope==='session');
              if(sm.length){ lines.push(''); sm.forEach(me=>lines.push(`${me.name}: ${me.value} ${me.unit}`)); }
              // also check series metrics
              if(r.series&&r.series.length){
                r.series.forEach((s,si)=>{
                  const ssm=(s.metrics||[]).filter(m=>m.scope==='session');
                  if(ssm.length){ lines.push(`Série ${si+1}:`); ssm.forEach(m=>lines.push(`  ${m.name}: ${m.value} ${m.unit}`)); }
                });
              }
              return lines;
            }
          }
        }
      },
      scales:{
        y:{
          min: minY-pad,
          max: maxY+pad,
          grid:{color:'rgba(128,128,128,0.08)'},
          afterBuildTicks:(axis)=>{
            // only show exact data values as ticks
            axis.ticks=uniqueYs.map(v=>({value:v}));
          },
          ticks:{font:{size:11}, callback:(v)=>parseFloat(parseFloat(v).toFixed(4))}
        },
        x:{
          type:'linear',
          grid:{color:'rgba(128,128,128,0.05)'},
          ticks:{font:{size:11}, maxTicksLimit:8,
            callback:(v)=>{ const d=new Date(v); return `${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')}.${d.getFullYear()}`; }
          }
        }
      }
    }
  };
}

function groupByDate(recs, mode){
  const mtype=mt(recs[0]?.type);
  const lowerBetter=mtype&&mtype.lib;
  const byDate={};
  recs.forEach(r=>{
    const v=mode==='avg'?avg(r):best(r);
    if(!byDate[r.date]||(lowerBetter?v<byDate[r.date].val:v>byDate[r.date].val)){
      byDate[r.date]={val:v,r};
    }
  });
  return Object.values(byDate).sort((a,b)=>a.r.date.localeCompare(b.r.date));
}

function drawChart(){
  const typeId=document.getElementById('chart-sel').value;

  if(perfChart){perfChart.destroy();perfChart=null;}
  const ctx=document.getElementById('perf-chart').getContext('2d');
  const {scatterData,options}=buildChartConfig(groupedRecs,vals,mode,recs[0]?.unit||'');
  perfChart=new Chart(ctx,{
    type:'scatter',
    data:{datasets:[{data:scatterData,borderColor:'#185FA5',backgroundColor:'rgba(24,95,165,0.1)',
      pointBackgroundColor:'#185FA5',pointRadius:7,pointHoverRadius:10,showLine:true,tension:0.3,fill:true,borderWidth:2}]},

}

    document.querySelectorAll('#av-addperf .attempt-val').forEach(inp=>{ const v=parseFloat(inp.value); if(!isNaN(v)) athAttempts.push(v); });
  }
  const rec={id:'r'+Date.now(),ath:CU.id,type,attempts:athAttempts,unit,date,note,metrics:ath_metrics,series:athSeriesData};
  try{
    await sbInsert('records',{...rec,series:rec.series?JSON.stringify(rec.series):null});
    D.records.push(rec);
    aa.innerHTML=`<div class="alert alert-g">Výkon uložen! ${attempts.length} pokus${attempts.length>1?'ů':''}</div>`;
    setTimeout(()=>{ renderAthleteAddForm(); },1500);
  }catch(e){ aa.innerHTML='<div class="alert alert-r">Chyba uložení: '+e.message+'</div>'; }
}

document.getElementById('login-pass').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
</script>
